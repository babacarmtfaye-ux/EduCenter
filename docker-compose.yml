version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: educenter-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: educenter
      POSTGRES_USER: educenter
      POSTGRES_PASSWORD: educenter
    volumes:
      - ./src/main/resources/db:/docker-entrypoint-initdb.d
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
